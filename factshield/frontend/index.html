<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI V4 | Tactical Integrity Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #020617; color: #f8fafc; margin: 0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .status-badge { font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
        .status-verified { background: #10b981; color: #020617; }
        .status-suspicious { background: #f59e0b; color: #020617; }
        .status-checking { background: #3b82f6; color: white; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .node-line { position: absolute; left: 50%; top: 100%; width: 2px; height: 40px; background: rgba(34, 211, 238, 0.2); }
        #evidence-graph { width: 100%; height: 350px; background: rgba(0,0,0,0.2); border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); cursor: grab; }
        #evidence-graph:active { cursor: grabbing; }
        .modal-overlay { pointer-events: auto !important; }
        .modal-content { pointer-events: auto !important; }
        a { cursor: pointer !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API_BASE = "http://127.0.0.1:8000";

        // --- COMPONENTS ---

        const EvidenceGraph = ({ claim, evidence }) => {
            const containerRef = useRef(null);
            const networkRef = useRef(null);

            useEffect(() => {
                if (!containerRef.current) return;

                const urlRegex = /(https?:\/\/[^\s]+)/g;

                const nodes = new vis.DataSet([
                    { 
                        id: 0, 
                        label: "CLAIM\n" + (claim.length > 50 ? claim.substring(0, 47) + "..." : claim), 
                        fullText: claim,
                        color: { background: '#0ea5e9', border: '#38bdf8', highlight: '#7dd3fc' },
                        font: { color: '#ffffff', size: 14, face: 'Space Grotesk', strokeWidth: 0, multi: true, bold: true },
                        shape: 'dot',
                        size: 35,
                        shadow: { enabled: true, color: 'rgba(14, 165, 233, 0.4)', size: 15 }
                    },
                    ...evidence.map((ev, i) => {
                        let label = ev;
                        let url = null;
                        
                        const match = ev.match(urlRegex);
                        if (match) {
                            url = match[0];
                            try {
                                const urlObj = new URL(url);
                                label = urlObj.hostname;
                            } catch (e) {
                                label = "LINK SOURCE";
                            }
                        } else if (ev.length > 40) {
                            label = ev.substring(0, 37) + "...";
                        }

                        return {
                            id: i + 1,
                            label: label,
                            fullText: ev,
                            url: url,
                            title: ev, // Tooltip
                            color: { background: '#1e293b', border: '#475569', highlight: '#64748b' },
                            font: { color: '#94a3b8', size: 10, face: 'Space Grotesk' },
                            shape: 'dot',
                            size: 20,
                            borderWidth: 2
                        };
                    })
                ]);

                const edges = new vis.DataSet(
                    evidence.map((_, i) => ({
                        from: 0,
                        to: i + 1,
                        color: { color: 'rgba(148, 163, 184, 0.2)', highlight: 'rgba(14, 165, 233, 0.4)' },
                        width: 1,
                        smooth: { type: 'continuous' }
                    }))
                );

                const options = {
                    nodes: {
                        scaling: { label: { enabled: true } },
                        margin: 10
                    },
                    edges: { arrows: { to: { enabled: false } } },
                    physics: {
                        stabilization: true,
                        barnesHut: { gravitationalConstant: -2000, centralGravity: 0.3, springLength: 150 }
                    },
                    interaction: { hover: true, tooltipDelay: 200, selectable: true, dragNodes: true }
                };

                if (networkRef.current) {
                    networkRef.current.destroy();
                }

                networkRef.current = new vis.Network(containerRef.current, { nodes, edges }, options);

                networkRef.current.on('click', (params) => {
                    if (params.nodes.length > 0) {
                        const nodeId = params.nodes[0];
                        const nodeData = nodes.get(nodeId);
                        if (nodeData) {
                            const detailsDiv = document.getElementById('node-details');
                            if (detailsDiv) {
                                detailsDiv.innerText = nodeData.fullText || nodeData.label;
                                detailsDiv.classList.remove('text-slate-400');
                                detailsDiv.classList.add('text-cyan-400');
                            }
                            if (nodeData.url) {
                                window.open(nodeData.url, '_blank');
                            }
                        }
                    }
                });

                networkRef.current.on('hoverNode', () => {
                    containerRef.current.style.cursor = 'pointer';
                });
                networkRef.current.on('blurNode', () => {
                    containerRef.current.style.cursor = 'default';
                });

                const handleResize = () => {
                    if (networkRef.current) networkRef.current.redraw();
                };
                window.addEventListener('resize', handleResize);
                return () => {
                    window.removeEventListener('resize', handleResize);
                    if (networkRef.current) networkRef.current.destroy();
                };
            }, [claim, evidence]);

            return (
                <div className="flex flex-col gap-3" style={{ pointerEvents: 'auto' }}>
                    <div id="evidence-graph" ref={containerRef} style={{ pointerEvents: 'auto', position: 'relative', zIndex: 10 }}></div>
                    <div id="node-details" className="p-4 bg-slate-900/60 border border-white/5 rounded-2xl text-[10px] text-slate-400 italic leading-relaxed min-h-[60px] flex items-center justify-center text-center">
                        Select a node to inspect neural evidence...
                    </div>
                </div>
            );
        };

        const XAIHeatmap = ({ attributions }) => {
            if (!attributions || !Array.isArray(attributions) || attributions.length === 0) {
                return (
                    <div id="xai-container" className="p-6 bg-slate-950/40 border border-white/5 rounded-3xl text-xs text-slate-500 italic text-center">
                        Mechanistic interpretability data unavailable for this claim.
                    </div>
                );
            }

            return (
                <div id="xai-container" className="flex flex-wrap gap-y-2 p-6 bg-slate-950/40 border border-white/5 rounded-3xl leading-relaxed">
                    {attributions.map((item, i) => {
                        const score = item.attribution_score || item.score || 0;
                        const opacity = Math.min(Math.abs(score) * 1.2, 0.9); // Optimized for visibility
                        
                        let bgColor = 'transparent';
                        if (score > 0) {
                            bgColor = `rgba(255, 50, 50, ${opacity})`; // Red for Fake/Hate
                        } else if (score < 0) {
                            bgColor = `rgba(50, 150, 255, ${opacity})`; // Blue for Real/Safe
                        }

                        return (
                            <span 
                                key={i} 
                                style={{ 
                                    backgroundColor: bgColor, 
                                    padding: '2px 4px', 
                                    borderRadius: '4px', 
                                    marginRight: '2px', 
                                    display: 'inline-block',
                                    color: opacity > 0.4 ? '#fff' : '#cbd5e1'
                                }}
                                className="text-sm font-medium transition-all hover:scale-105 cursor-help"
                                title={`Score: ${score.toFixed(4)}`}
                            >
                                {item.word}
                            </span>
                        );
                    })}
                </div>
            );
        };

        const Badge = ({ type, text }) => {
            const styles = {
                real: "bg-emerald-500/20 text-emerald-400 border-emerald-500/30",
                fake: "bg-rose-500/20 text-rose-400 border-rose-500/30",
                misleading: "bg-amber-500/20 text-amber-400 border-amber-500/30",
                hate: "bg-purple-500/20 text-purple-400 border-purple-500/30",
                safe: "bg-cyan-500/20 text-cyan-400 border-cyan-500/30",
            };
            return (
                <span className={`px-2 py-0.5 rounded-full text-[9px] font-bold border uppercase tracking-wider ${styles[type.toLowerCase()] || "bg-slate-500/20 text-slate-400 border-slate-500/30"}`}>
                    {text}
                </span>
            );
        };

        const FeedCard = ({ item, onVerify }) => (
            <div className="glass p-6 rounded-2xl border border-white/5 hover:border-cyan-500/30 transition-all mb-4 group relative overflow-hidden">
                <div className="flex justify-between items-start mb-4">
                    <div className="flex items-center gap-3">
                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${item.type === 'NEWS' ? 'bg-cyan-500/10 text-cyan-400' : 'bg-rose-500/10 text-rose-400'}`}>
                            <i className={`fas ${item.type === 'NEWS' ? 'fa-newspaper' : 'fa-triangle-exclamation'}`}></i>
                        </div>
                        <div>
                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">{item.source}</p>
                            <p className="text-[9px] text-slate-600">{item.timestamp}</p>
                        </div>
                    </div>
                    <span className={`status-badge ${item.status === 'VERIFIED' ? 'status-verified' : item.status === 'SUSPICIOUS' ? 'status-suspicious' : 'status-checking'}`}>
                        {item.status}
                    </span>
                </div>
                <h3 className="text-md font-bold mb-2 group-hover:text-cyan-400 transition-colors leading-tight">{item.title}</h3>
                <p className="text-xs text-slate-400 leading-relaxed mb-6 line-clamp-2">{item.description}</p>
                <button onClick={() => onVerify(item.description)} className="text-[10px] font-black text-cyan-400 hover:text-cyan-300 flex items-center gap-2 uppercase tracking-widest">
                    <i className="fas fa-microscope"></i> Deconstruct Propaganda
                </button>
            </div>
        );

        // --- MAIN APP ---

        function App() {
            const [view, setView] = useState("dashboard"); // dashboard, neural, archive
            const [feed, setFeed] = useState([]);
            const [query, setQuery] = useState("");
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [points, setPoints] = useState(parseInt(localStorage.getItem('truth_points_v4') || '0'));
            const [archive, setArchive] = useState([]);
            const [neuralStats, setNeuralStats] = useState(null);
            
            const fileInputRef = useRef(null);
            const videoInputRef = useRef(null);

            useEffect(() => {
                fetchFeed();
                if (view === 'archive') fetchArchive();
                if (view === 'neural') fetchNeural();
            }, [view]);

            const fetchFeed = async () => {
                try {
                    const res = await fetch(`${API_BASE}/feed`);
                    if (res.ok) setFeed(await res.json());
                } catch (e) { console.warn("Feed offline"); }
            };

            const fetchArchive = async () => {
                try {
                    const res = await fetch(`${API_BASE}/archive`);
                    if (res.ok) setArchive(await res.json());
                } catch (e) { console.warn("Archive offline"); }
            };

            const fetchNeural = async () => {
                try {
                    const res = await fetch(`${API_BASE}/neural-stats`);
                    if (res.ok) setNeuralStats(await res.json());
                } catch (e) { console.warn("Neural Stats offline"); }
            };

            const pollTaskStatus = async (taskId) => {
                const poll = async () => {
                    try {
                        const res = await fetch(`${API_BASE}/task-status/${taskId}`);
                        const data = await res.json();
                        if (data.status === 'completed') {
                            setResult(data.result);
                            setLoading(false);
                            return true;
                        } else if (data.status === 'failed') {
                            alert("Analysis failed: " + (data.error || "Unknown Error"));
                            setLoading(false);
                            return true;
                        }
                        return false;
                    } catch (e) {
                        console.error("Polling error", e);
                        alert("Lost connection while checking task status. Please try again.");
                        setLoading(false);
                        return true;
                    }
                };

                const interval = setInterval(async () => {
                    const done = await poll();
                    if (done) clearInterval(interval);
                }, 2000);
            };

            const handleAnalyze = async (textToUse = query) => {
                if (!textToUse.trim()) return;
                setLoading(true);
                try {
                    const res = await fetch(`${API_BASE}/verify`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: textToUse })
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        throw new Error(data.detail || data.error || 'Analysis request failed.');
                    }
                    if (data.task_id) {
                        pollTaskStatus(data.task_id);
                    } else {
                        setResult(data);
                        setLoading(false);
                    }
                    const newPoints = points + 25;
                    setPoints(newPoints);
                    localStorage.setItem('truth_points_v4', newPoints);
                } catch (e) { alert(e.message || "Backend Unreachable"); setLoading(false); }
            };

            const handleMultimodalUpload = async (file, endpoint) => {
                if (!file) return;
                setLoading(true);
                const formData = new FormData();
                formData.append('file', file);
                try {
                    const res = await fetch(`${API_BASE}${endpoint}`, { method: 'POST', body: formData });
                    const data = await res.json();
                    if (!res.ok) {
                        alert(data.detail || data.error || "Analysis Service Failed");
                        setLoading(false);
                    } else if (data.error) {
                        alert(data.error);
                        setLoading(false);
                    } else if (data.task_id) {
                        pollTaskStatus(data.task_id);
                        const newPoints = points + 50;
                        setPoints(newPoints);
                        localStorage.setItem('truth_points_v4', newPoints);
                    } else {
                        setResult(data);
                        const newPoints = points + 50;
                        setPoints(newPoints);
                        localStorage.setItem('truth_points_v4', newPoints);
                        setLoading(false);
                    }
                } catch (e) { alert("Analysis Service Failed"); setLoading(false); }
            };

            return (
                <div className="flex h-screen bg-[#020617] text-slate-100 p-6 gap-6">
                    {/* Sidebar */}
                    <aside className="w-72 glass rounded-[32px] p-8 flex flex-col border border-white/5">
                        <div className="flex items-center gap-3 text-cyan-400 mb-12">
                            <i className="fas fa-shield-halved text-3xl"></i>
                            <h1 className="text-xl font-bold tracking-tighter text-white uppercase">SAMI <span className="text-cyan-400 italic">V4</span></h1>
                        </div>

                        <nav className="flex flex-col gap-6 flex-grow">
                            <div className="flex flex-col gap-1">
                                <span className="text-[10px] uppercase font-bold text-slate-500 mb-2 px-3">Protocol</span>
                                <button onClick={() => setView('dashboard')} className={`flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-bold text-left transition-all ${view === 'dashboard' ? 'bg-cyan-500/10 text-cyan-400' : 'text-slate-400 hover:text-white'}`}><i className="fas fa-rss"></i> Integrity Feed</button>
                                <button onClick={() => setView('neural')} className={`flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-bold text-left transition-all ${view === 'neural' ? 'bg-cyan-500/10 text-cyan-400' : 'text-slate-400 hover:text-white'}`}><i className="fas fa-brain"></i> Neural Logic</button>
                                <button onClick={() => setView('archive')} className={`flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-bold text-left transition-all ${view === 'archive' ? 'bg-cyan-500/10 text-cyan-400' : 'text-slate-400 hover:text-white'}`}><i className="fas fa-scroll"></i> History Archive</button>
                            </div>

                            <div className="bg-slate-900/50 p-6 rounded-2xl border border-white/5">
                                <p className="text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-2">Truth Guardian</p>
                                <div className="flex justify-between items-end">
                                    <span className="text-[9px] text-slate-500 font-bold uppercase tracking-tighter italic">Progress</span>
                                    <span className="text-xl font-black text-white">{points}</span>
                                </div>
                                <div className="w-full bg-slate-800 h-1 mt-2 rounded-full overflow-hidden"><div className="bg-cyan-500 h-full" style={{width: `${points % 100}%`}}></div></div>
                            </div>
                        </nav>

                        <div className="pt-6 border-t border-white/5 flex items-center gap-4">
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-cyan-400 to-rose-600 flex items-center justify-center font-black text-slate-950 text-xs">AS</div>
                            <div className="overflow-hidden"><p className="text-xs font-bold truncate">Ansar.Admin</p><p className="text-[9px] text-slate-500 font-bold uppercase tracking-tighter">Integrity Lead</p></div>
                        </div>
                    </aside>

                    {/* Main Feed / Content */}
                    <main className="flex-grow flex flex-col gap-6 overflow-hidden">
                        <header className="flex justify-between items-center px-4">
                            <h2 className="text-2xl font-black tracking-tight uppercase">
                                {view === 'dashboard' ? <>Social <span className="text-cyan-400">Intelligence Feed</span></> : 
                                 view === 'neural' ? <>Neural <span className="text-cyan-400">Processing Logic</span></> : 
                                 <>Memory <span className="text-cyan-400">Archive Core</span></>}
                            </h2>
                            <div className="flex items-center gap-2 text-[10px] font-bold text-emerald-400 uppercase tracking-widest">
                                <span className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span> System Live
                            </div>
                        </header>

                        <div className="flex-grow overflow-y-auto custom-scroll pr-2">
                            {view === 'dashboard' && (
                                <div className="grid grid-cols-1 gap-4">
                                    {feed.length > 0 ? feed.map(item => (
                                        <FeedCard key={item.id} item={item} onVerify={(txt) => { setQuery(txt); handleAnalyze(txt); }} />
                                    )) : <div className="space-y-4">{[1,2,3].map(i => <div key={i} className="glass h-48 rounded-2xl animate-pulse"></div>)}</div>}
                                </div>
                            )}

                            {view === 'archive' && (
                                <div className="grid grid-cols-1 gap-4">
                                    <div className="glass p-8 rounded-3xl mb-6">
                                        <h3 className="text-sm font-bold text-cyan-400 mb-4 uppercase tracking-widest italic border-l-2 border-cyan-500 pl-4">System Memory (Local FAISS Store)</h3>
                                        <p className="text-xs text-slate-400 leading-relaxed mb-8 font-medium">When SAMI encounters new propaganda via live search, it ingests the verified evidence into its local FAISS vector store. This ensures the system "learns" and remembers facts without relying solely on an external LLM.</p>
                                        <div className="space-y-3">
                                            {archive.map((fact, i) => (
                                                <div key={i} className="p-4 bg-white/5 border border-white/5 rounded-xl text-[11px] text-slate-300 italic leading-relaxed">
                                                    {typeof fact === 'string' ? fact : `[${fact.source}] ${fact.text}`}
                                                </div>
                                            ))}
                                            {archive.length === 0 && <p className="text-xs text-slate-600 italic">No local memory logs found.</p>}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {view === 'neural' && (
                                <div className="flex flex-col items-center gap-12 pt-10">
                                    <div className="text-center max-w-xl">
                                        <h3 className="text-sm font-bold text-cyan-400 mb-4 uppercase tracking-widest italic">Multi-Stage Tactical Pipeline</h3>
                                        <p className="text-xs text-slate-400 leading-relaxed font-medium font-medium">SAMI is a custom-built hybrid system. It combines local neural models with dynamic retrieval-augmented generation (RAG) to ensure accuracy and prevent "hallucinations" common in basic LLM plugins.</p>
                                    </div>
                                    
                                    <div className="flex flex-col items-center gap-10 w-full max-w-2xl">
                                        <div className="glass p-6 rounded-2xl w-full border-cyan-500/20 relative flex items-center justify-between">
                                            <div><p className="text-[10px] font-black text-cyan-400 uppercase mb-1">Stage 1: Local Screening</p><p className="text-sm font-bold uppercase">{neuralStats?.local_classifier || "XLM-Roberta"}</p></div>
                                            <i className="fas fa-microchip text-2xl text-cyan-500/50"></i>
                                            <div className="node-line"></div>
                                        </div>
                                        <div className="glass p-6 rounded-2xl w-full border-cyan-500/20 relative flex items-center justify-between">
                                            <div><p className="text-[10px] font-black text-emerald-400 uppercase mb-1">Stage 2: Local Memory Retrieval</p><p className="text-sm font-bold uppercase">{neuralStats?.vector_engine || "FAISS Vector DB"}</p></div>
                                            <i className="fas fa-database text-2xl text-emerald-500/50"></i>
                                            <div className="node-line"></div>
                                        </div>
                                        <div className="glass p-6 rounded-2xl w-full border-cyan-500/20 relative flex items-center justify-between">
                                            <div><p className="text-[10px] font-black text-purple-400 uppercase mb-1">Stage 3: Local Reranking</p><p className="text-sm font-bold uppercase">{neuralStats?.reranker || "Cross-Encoder (Local)"}</p></div>
                                            <i className="fas fa-filter text-2xl text-purple-500/50"></i>
                                            <div className="node-line"></div>
                                        </div>
                                        <div className="glass p-6 rounded-2xl w-full border-cyan-500/40 relative flex items-center justify-between shadow-[0_0_30px_rgba(34,211,238,0.1)]">
                                            <div><p className="text-[10px] font-black text-white uppercase mb-1">Stage 4: Expert Reasoning</p><p className="text-sm font-bold uppercase">{neuralStats?.reasoner || "Llama 3.3 (API)"}</p></div>
                                            <i className="fas fa-robot text-2xl text-white/50"></i>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Right Console */}
                    <aside className="w-96 flex flex-col gap-6 overflow-hidden">
                        <div className="glass rounded-[32px] p-8 flex flex-col border border-white/5 flex-grow relative overflow-hidden">
                            <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-6 flex items-center gap-2"><i className="fas fa-bolt text-cyan-400"></i> Tactical Console</h3>
                            <textarea value={query} onChange={(e) => setQuery(e.target.value)} className="w-full h-40 bg-slate-950/50 border border-white/5 rounded-2xl p-6 text-xs focus:outline-none focus:border-cyan-500/50 transition-all resize-none mb-4" placeholder="Input context for analysis..." />
                            <div className="flex gap-2 mb-4">
                                <input type="file" hidden ref={fileInputRef} onChange={(e) => handleMultimodalUpload(e.target.files[0], '/verify-image')} accept="image/*" />
                                <input type="file" hidden ref={videoInputRef} onChange={(e) => handleMultimodalUpload(e.target.files[0], '/verify-video')} accept="video/*" />
                                <button onClick={() => fileInputRef.current.click()} className="flex-grow glass py-3 rounded-xl text-[10px] font-bold uppercase text-slate-400 hover:text-cyan-400 transition-all"><i className="fas fa-image mr-2"></i> Image</button>
                                <button onClick={() => videoInputRef.current.click()} className="flex-grow glass py-3 rounded-xl text-[10px] font-bold uppercase text-slate-400 hover:text-rose-400 transition-all"><i className="fas fa-video mr-2"></i> Reel</button>
                            </div>
                            <button onClick={() => handleAnalyze()} disabled={loading} className="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-black py-4 rounded-xl transition-all flex items-center justify-center gap-3 disabled:opacity-50 uppercase tracking-widest text-[10px]">
                                {loading ? <i className="fas fa-atom animate-spin"></i> : <i className="fas fa-shield-halved"></i>}
                                {loading ? "Processing..." : "Run Sami Logic"}
                            </button>
                        </div>

                        <div className="glass rounded-[32px] p-6 border border-rose-500/10">
                            <h3 className="text-[10px] font-black text-rose-400 uppercase tracking-widest mb-4 flex items-center gap-2"><i className="fas fa-chart-line"></i> Propaganda Index</h3>
                            <div className="flex justify-between items-center mb-2"><span className="text-xs text-slate-300">Historical Revisionism</span><span className="text-xs font-bold text-rose-500">High</span></div>
                            <div className="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden"><div className="bg-rose-500 h-full w-[85%]"></div></div>
                            <p className="text-[9px] text-slate-500 mt-3 leading-relaxed italic">System detecting abnormal spikes in misattributed quotes targeting Indian historical figures on Instagram Reels India.</p>
                        </div>
                    </aside>

                    {/* Modal */}
                    {result && (
                        <div className="modal-overlay fixed inset-0 z-[100] flex items-center justify-center p-12 bg-slate-950/90 backdrop-blur-md">
                            <div className="modal-content glass w-full max-w-5xl rounded-[48px] p-12 relative border-cyan-500/30 max-h-[90vh] overflow-y-auto custom-scroll">
                                <button onClick={() => setResult(null)} className="absolute top-10 right-10 text-slate-500 hover:text-white transition-all text-2xl"><i className="fas fa-times"></i></button>
                                <div className="flex items-center gap-3 mb-8">
                                    <div className={`px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-widest border ${result.veracity.prediction === 'real' ? 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30' : result.veracity.prediction === 'unknown' ? 'bg-slate-500/20 text-slate-400 border-slate-500/30' : 'bg-rose-500/20 text-rose-400 border-rose-500/30'}`}>{result.veracity.prediction}</div>
                                    <Badge type={result.toxicity?.prediction || 'unknown'} text={`Toxicity: ${result.toxicity?.prediction || 'unknown'}`} />
                                    <span className="text-[10px] font-bold text-slate-600 ml-auto uppercase tracking-widest italic">Tactical Intel Protocol v4.2</span>
                                </div>
                                <h2 className="text-3xl font-black mb-12 leading-tight text-white italic border-l-8 border-cyan-500 pl-8">"{result.claim}"</h2>
                                <div className="mb-12">
                                    <h4 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4 flex items-center gap-3"><i className="fas fa-eye"></i> Mechanistic Interpretability (XAI)</h4>
                                    <p className="text-[10px] text-slate-500 italic mb-4">
                                        Token influence for the displayed veracity label: {result.xai_target_label || result.veracity.prediction}
                                    </p>
                                    <XAIHeatmap attributions={result.xai_attributions} />
                                </div>
                                <div className="grid grid-cols-2 gap-12">
                                    <div className="flex flex-col gap-8">
                                        <div className="bg-slate-950/50 p-8 rounded-[40px] border border-white/5">
                                            <h4 className="text-[10px] font-black text-cyan-400 uppercase tracking-[0.2em] mb-6 flex items-center gap-3"><i className="fas fa-brain"></i> Manipulation Anatomy</h4>
                                            <div className="bg-amber-500/5 border border-amber-500/10 p-5 rounded-2xl mb-6">
                                                <p className="text-[11px] leading-relaxed text-amber-200/80 italic font-medium">
                                                    {Array.isArray(result.propaganda_anatomy) ? result.propaganda_anatomy.join(" ") : result.propaganda_anatomy}
                                                </p>
                                            </div>
                                            <p className="text-sm leading-relaxed text-slate-400 font-medium">{result.generated_reason}</p>
                                        </div>
                                        {result.historical_context && (
                                            <div className="bg-cyan-500/5 p-8 rounded-[40px] border border-cyan-500/20">
                                                <h4 className="text-[10px] font-black text-cyan-400 uppercase tracking-[0.2em] mb-4 flex items-center gap-3"><i className="fas fa-clock-rotate-left"></i> Verified Historical Fact</h4>
                                                <p className="text-sm leading-relaxed text-slate-400 italic italic font-bold">{result.historical_context}</p>
                                            </div>
                                        )}
                                    </div>
                                    <div className="flex flex-col gap-6">
                                        <h4 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] flex items-center gap-3"><i className="fas fa-link"></i> RAG Neural Evidence Graph</h4>
                                        <EvidenceGraph claim={result.claim} evidence={result.evidence || []} />
                                        <div className="flex flex-col gap-4 max-h-[200px] overflow-y-auto custom-scroll pr-2">
                                            {(result.evidence || []).map((ev, i) => {
                                                const urlRegex = /(https?:\/\/[^\s]+)/g;
                                                const parts = ev.split(urlRegex);
                                                const matches = ev.match(urlRegex);
                                                
                                                return (
                                                    <div key={i} className="text-[10px] p-4 rounded-2xl bg-white/5 border border-white/5 text-slate-400 leading-relaxed italic">
                                                        {parts.map((part, j) => {
                                                            if (matches && matches.includes(part)) {
                                                                return <a key={j} href={part} target="_blank" rel="noopener noreferrer" className="text-cyan-400 hover:underline break-all">{part}</a>;
                                                            }
                                                            return part;
                                                        })}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => setResult(null)} className="w-full mt-12 bg-white/5 border border-white/10 hover:border-cyan-400 text-slate-500 hover:text-cyan-400 py-5 rounded-3xl transition-all font-black text-xs uppercase tracking-[0.3em]">Dismiss Tactical Report</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
