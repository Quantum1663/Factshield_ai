<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI — Social Integrity System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js"></script>
    <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { accent: { DEFAULT: '#6366f1', light: '#818cf8', dark: '#4f46e5', 50: '#eef2ff' } },
                }
            }
        };
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
        @keyframes fade-up { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
        .fade-up { animation: fade-up .35s ease-out both; }
        @keyframes shimmer { to { background-position: -200% center; } }
        .shimmer { background: linear-gradient(90deg, #f1f5f9 40%, #e2e8f0 50%, #f1f5f9 60%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        .stat-card { background: linear-gradient(135deg, #fff 60%, #f8fafc); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API = (() => { if (window.location.port === '8000') return window.location.origin; return "http://127.0.0.1:8000"; })();

        /* ── Inline SVG Icons ── */
        const I = {
            shield:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>,
            search:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            rss:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>,
            trend:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
            db:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>,
            cpu:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2M15 20v2M2 15h2M2 9h2M20 15h2M20 9h2M9 2v2M9 20v2"/></svg>,
            img:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>,
            vid:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 13 5.223 3.482a.5.5 0 0 0 .777-.416V7.87a.5.5 0 0 0-.752-.432L16 10.5"/><rect width="14" height="12" x="2" y="6" rx="2"/></svg>,
            zap:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg>,
            x:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
            news:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>,
            hash:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="9" y2="9"/><line x1="4" x2="20" y1="15" y2="15"/><line x1="10" x2="8" y1="3" y2="21"/><line x1="16" x2="14" y1="3" y2="21"/></svg>,
            brain:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/></svg>,
            eye:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>,
            net:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/></svg>,
            spin:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>,
            pulse:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/></svg>,
            layers:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/></svg>,
            check:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>,
            arrowUp:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m5 12 7-7 7 7M12 19V5"/></svg>,
        };
        const Icon = ({name, sz=20, className=""}) => { const s=I[name]; return s ? <span className={`inline-flex items-center justify-center ${className}`} style={{width:sz,height:sz}}>{React.cloneElement(s,{width:sz,height:sz})}</span> : null; };

        /* ── Evidence Graph ── */
        function EvidenceGraph({claim, evidence}) {
            const ref = useRef(null);
            useEffect(() => {
                if (!ref.current || !Array.isArray(evidence) || !evidence.length) return;
                const nd = new vis.DataSet([ {id:0,label:claim.length>40?claim.slice(0,37)+'...':claim,color:{background:"#6366f1",border:"#4f46e5"},font:{color:"#fff",face:"Inter",size:13},shape:"dot",size:26},
                    ...evidence.map((e,i)=>({id:i+1,label:String(e).slice(0,38),color:{background:"#f8fafc",border:"#cbd5e1"},font:{color:"#334155",face:"Inter",size:11},shape:"box",margin:10,widthConstraint:{maximum:160}}))]);
                const ed = new vis.DataSet(evidence.map((_,i)=>({from:0,to:i+1,color:{color:"rgba(99,102,241,.2)"},width:1.5,smooth:{type:'continuous'}})));
                const n = new vis.Network(ref.current,{nodes:nd,edges:ed},{physics:{stabilization:true,barnesHut:{gravitationalConstant:-2800,springLength:140}},interaction:{hover:true,dragNodes:true,zoomView:true}});
                return ()=>n.destroy();
            },[claim,evidence]);
            return <div ref={ref} className="h-72 w-full rounded-xl bg-gradient-to-br from-slate-50 to-white border border-slate-200"></div>;
        }
        /* ── XAI Heatmap ── */
        function XAIHeatmap({attributions}) {
            if (!Array.isArray(attributions)||!attributions.length) return <div className="rounded-xl border border-dashed border-slate-200 bg-slate-50 p-6 text-sm text-slate-400 text-center">Interpretability data unavailable for this report.</div>;
            return (<div className="flex flex-wrap gap-1.5 p-4 bg-gradient-to-br from-slate-50 to-white rounded-xl border border-slate-100">{attributions.map((t,i)=>{
                const s=t.attribution_score||t.score||0, a=Math.min(Math.abs(s)*1.5,.85);
                const bg=s>0?`rgba(239,68,68,${a})`:s<0?`rgba(34,197,94,${a})`:"rgba(0,0,0,.04)";
                return <span key={`${t.word}-${i}`} title={`Score: ${s.toFixed(4)}`} className="rounded-md px-1.5 py-0.5 text-sm font-mono cursor-help hover:scale-110 transition-transform" style={{backgroundColor:bg,color:a>.5?"#fff":"#334155"}}>{t.word}</span>;
            })}</div>);
        }

        /* ── App ── */
        function App() {
            const [view,setView]=useState("overview"); const [feed,setFeed]=useState([]); const [trending,setTrending]=useState([]); const [archive,setArchive]=useState([]);
            const [stats,setStats]=useState(null); const [neural,setNeural]=useState(null); const [query,setQuery]=useState(""); const [result,setResult]=useState(null); const [loading,setLoading]=useState(false);
            const imgRef=useRef(null); const vidRef=useRef(null);

            useEffect(()=>{refreshAll();const i=setInterval(refreshAll,60000);return()=>clearInterval(i);},[]);
            useEffect(()=>{if(view==="archive")refreshArchive();if(view==="trending")refreshTrending();if(view==="architecture")refreshNeural();},[view]);
            const refreshAll=()=>{refreshFeed();refreshTrending();refreshStats();refreshNeural();};
            const refreshFeed=async()=>{try{const r=await fetch(`${API}/feed`);if(r.ok)setFeed(await r.json());}catch(e){console.error(e);}};
            const refreshTrending=async()=>{try{const r=await fetch(`${API}/trending`);if(r.ok)setTrending(await r.json());}catch(e){console.error(e);}};
            const refreshArchive=async()=>{try{const r=await fetch(`${API}/archive`);if(r.ok)setArchive(await r.json());}catch(e){console.error(e);}};
            const refreshStats=async()=>{try{const r=await fetch(`${API}/system-status`);if(r.ok)setStats(await r.json());}catch(e){console.error(e);}};
            const refreshNeural=async()=>{try{const r=await fetch(`${API}/neural-stats`);if(r.ok)setNeural(await r.json());}catch(e){console.error(e);}};

            const poll=(id)=>{let n=0;const iv=setInterval(async()=>{if(++n>90){clearInterval(iv);setLoading(false);alert("Timed out.");return;}try{const r=await fetch(`${API}/task-status/${id}`);const d=await r.json();if(d.status==="completed"){clearInterval(iv);setResult(d.result);setLoading(false);}if(d.status==="failed"){clearInterval(iv);setLoading(false);alert(d.error||"Failed");}}catch{clearInterval(iv);setLoading(false);alert("Connection lost.");}},2000);};
            const submit=async(text=query)=>{const c=String(text||"").trim();if(!c)return;setResult(null);setLoading(true);try{const r=await fetch(`${API}/verify`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:c})});const d=await r.json();if(!r.ok)throw new Error(d.detail||"Failed");if(d.task_id)poll(d.task_id);else{setResult(d);setLoading(false);}}catch(e){setLoading(false);alert(e.message);}};
            const upload=async(file,ep)=>{if(!file)return;const mx=ep.includes("video")?100:10;if(file.size>mx*1024*1024){alert(`Max ${mx}MB.`);return;}setResult(null);setLoading(true);const fd=new FormData();fd.append("file",file);try{const r=await fetch(`${API}${ep}`,{method:"POST",body:fd});const d=await r.json();if(!r.ok)throw new Error(d.detail||"Failed");if(d.task_id)poll(d.task_id);else{setResult(d);setLoading(false);}}catch(e){setLoading(false);alert(e.message);}};

            const bg=(v)=>{const k=String(v||"").toLowerCase();if(["real","verified","safe"].includes(k))return"bg-emerald-50 text-emerald-700 ring-emerald-600/20";if(["fake","misleading","suspicious","hate"].includes(k))return"bg-red-50 text-red-700 ring-red-600/20";return"bg-slate-100 text-slate-600 ring-slate-600/10";};
            const online = stats?.api_status === "running";

            const nav=[{id:"overview",label:"Overview",icon:"shield"},{id:"feed",label:"Feed",icon:"rss"},{id:"trending",label:"Trending",icon:"trend"},{id:"archive",label:"Archive",icon:"db"},{id:"architecture",label:"Architecture",icon:"cpu"}];

            /* ── Sidebar ── */
            const Sidebar=()=>(
                <aside className="w-[232px] flex-shrink-0 border-r border-slate-200/80 bg-white h-screen sticky top-0 flex flex-col">
                    <div className="px-5 pt-5 pb-4">
                        <div className="flex items-center gap-2.5">
                            <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-accent to-violet-600 flex items-center justify-center shadow-md shadow-accent/20"><Icon name="shield" sz={18} className="text-white"/></div>
                            <div><div className="text-sm font-extrabold tracking-tight">SAMI</div><div className="text-[10px] text-slate-400 font-medium -mt-0.5">Social Integrity System</div></div>
                        </div>
                    </div>
                    <nav className="flex-1 px-3 py-2 space-y-0.5 overflow-y-auto">
                        {nav.map(n=>(
                            <button key={n.id} onClick={()=>setView(n.id)} className={`w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-[13px] font-medium transition-all ${view===n.id?"bg-accent/10 text-accent shadow-sm shadow-accent/5":"text-slate-500 hover:text-slate-800 hover:bg-slate-50"}`}>
                                <Icon name={n.icon} sz={16}/>{n.label}
                            </button>
                        ))}
                    </nav>
                    {/* System health sidebar panel */}
                    <div className="mx-3 mb-3 p-3 rounded-xl bg-gradient-to-br from-slate-900 to-slate-800 text-white">
                        <div className="flex items-center gap-2 mb-3"><span className={`w-2 h-2 rounded-full ${online?"bg-emerald-400 shadow-lg shadow-emerald-400/50":"bg-red-400"} animate-pulse`}/><span className="text-[11px] font-medium">{online?"All Systems Online":"Offline"}</span></div>
                        <div className="grid grid-cols-2 gap-2">
                            <div className="bg-white/10 rounded-lg px-2.5 py-2"><div className="text-[10px] text-slate-300 mb-0.5">Vectors</div><div className="text-sm font-bold">{stats?.faiss_vectors||0}</div></div>
                            <div className="bg-white/10 rounded-lg px-2.5 py-2"><div className="text-[10px] text-slate-300 mb-0.5">Memory</div><div className="text-sm font-bold">{stats?.dataset_entries||0}</div></div>
                        </div>
                    </div>
                </aside>
            );

            /* ── Overview ── */
            const Overview=()=>(
                <div className="space-y-6 fade-up">
                    <div className="flex items-end justify-between">
                        <div><h1 className="text-2xl font-extrabold tracking-tight">Verification Hub</h1><p className="text-sm text-slate-500 mt-0.5">Multimodal AI fact-checking and propaganda detection.</p></div>
                        <div className="flex items-center gap-2 text-xs font-medium"><span className={`flex items-center gap-1.5 px-2.5 py-1 rounded-full ring-1 ${online?"bg-emerald-50 text-emerald-700 ring-emerald-600/20":"bg-red-50 text-red-700 ring-red-600/20"}`}><span className={`w-1.5 h-1.5 rounded-full ${online?"bg-emerald-500":"bg-red-500"}`}/>{online?"Connected":"Disconnected"}</span></div>
                    </div>

                    {/* Stat Cards */}
                    <div className="grid grid-cols-4 gap-3">
                        {[
                            {label:"Knowledge Base",val:stats?.dataset_entries||0,sub:"indexed records",icon:"layers",color:"text-indigo-500 bg-indigo-50"},
                            {label:"Vector Memory",val:stats?.faiss_vectors||0,sub:"searchable embeddings",icon:"db",color:"text-violet-500 bg-violet-50"},
                            {label:"Live Signals",val:feed.length,sub:"feed items active",icon:"pulse",color:"text-amber-500 bg-amber-50"},
                            {label:"Pipeline Health",val:online?"Optimal":"Down",sub:online?"all layers active":"reconnecting",icon:"cpu",color:"text-emerald-500 bg-emerald-50"},
                        ].map((s,i)=>(
                            <div key={i} className="stat-card rounded-xl border border-slate-200/80 p-4 hover:shadow-md hover:shadow-slate-200/50 transition-shadow">
                                <div className="flex items-center justify-between mb-3"><div className={`w-8 h-8 rounded-lg flex items-center justify-center ${s.color}`}><Icon name={s.icon} sz={16}/></div><span className="text-[10px] font-mono text-slate-400 uppercase">Live</span></div>
                                <div className="text-2xl font-extrabold tracking-tight">{s.val}</div>
                                <div className="text-[11px] text-slate-400 mt-0.5">{s.sub}</div>
                            </div>
                        ))}
                    </div>

                    {/* Command Center */}
                    <div className="rounded-2xl border border-slate-200/80 bg-white overflow-hidden shadow-sm">
                        <div className="bg-gradient-to-r from-accent/5 via-transparent to-violet-500/5 px-6 py-4 border-b border-slate-100 flex items-center gap-3">
                            <div className="w-9 h-9 rounded-xl bg-accent/10 flex items-center justify-center text-accent"><Icon name="search" sz={18}/></div>
                            <div><h2 className="text-sm font-bold">Verification Command Center</h2><p className="text-[11px] text-slate-400">Submit text, images, or video for full pipeline analysis.</p></div>
                        </div>
                        <div className="p-6">
                            <textarea value={query} onChange={e=>setQuery(e.target.value)} className="w-full h-28 bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent/30 resize-none transition" placeholder="Paste a claim, headline, or social media post to verify..."/>
                            <div className="flex items-center gap-2 mt-3">
                                <button onClick={()=>submit()} disabled={loading||!query.trim()} className="flex items-center gap-2 px-5 py-2.5 rounded-xl bg-gradient-to-r from-accent to-violet-600 text-white text-sm font-semibold shadow-md shadow-accent/25 hover:shadow-lg hover:shadow-accent/30 disabled:opacity-40 disabled:cursor-not-allowed transition-all hover:-translate-y-0.5 active:translate-y-0">
                                    {loading?<Icon name="spin" sz={16}/>:<Icon name="zap" sz={16}/>}{loading?"Processing...":"Analyze Claim"}
                                </button>
                                <input type="file" ref={imgRef} className="hidden" accept="image/*" onChange={e=>upload(e.target.files[0],"/verify-image")}/>
                                <input type="file" ref={vidRef} className="hidden" accept="video/*" onChange={e=>upload(e.target.files[0],"/verify-video")}/>
                                <button onClick={()=>imgRef.current.click()} className="flex items-center gap-1.5 px-3.5 py-2.5 rounded-xl border border-slate-200 text-sm text-slate-600 hover:bg-slate-50 hover:border-slate-300 transition"><Icon name="img" sz={16}/> Image</button>
                                <button onClick={()=>vidRef.current.click()} className="flex items-center gap-1.5 px-3.5 py-2.5 rounded-xl border border-slate-200 text-sm text-slate-600 hover:bg-slate-50 hover:border-slate-300 transition"><Icon name="vid" sz={16}/> Video</button>
                            </div>
                        </div>
                    </div>

                    {/* Two-column: Feed + Pipeline Health */}
                    <div className="grid grid-cols-5 gap-5">
                        <div className="col-span-3">
                            <div className="flex items-center justify-between mb-3"><h2 className="text-sm font-bold">Recent Signals</h2><button onClick={refreshFeed} className="text-[11px] text-accent font-semibold hover:underline">Refresh</button></div>
                            <div className="space-y-2">
                                {feed.slice(0,4).map(item=>(
                                    <div key={item.id} className="bg-white rounded-xl border border-slate-200/80 p-3.5 flex items-start gap-3.5 group hover:border-accent/30 hover:shadow-sm transition-all cursor-pointer" onClick={()=>{setQuery(item.description);submit(item.description);}}>
                                        <div className={`w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0 ${item.type==='NEWS'?'bg-blue-50 text-blue-500':'bg-violet-50 text-violet-500'}`}><Icon name={item.type==='NEWS'?'news':'hash'} sz={16}/></div>
                                        <div className="flex-1 min-w-0">
                                            <div className="flex items-center gap-2 mb-0.5"><span className="text-[10px] font-mono text-slate-400">{item.source}</span><span className={`text-[9px] font-bold px-1.5 py-0.5 rounded-full ring-1 ${bg(item.status)}`}>{item.status}</span></div>
                                            <h4 className="text-[13px] font-semibold text-slate-800 truncate group-hover:text-accent transition">{item.title}</h4>
                                            <p className="text-[11px] text-slate-400 mt-0.5 line-clamp-1">{item.description}</p>
                                        </div>
                                    </div>
                                ))}
                                {!feed.length&&<div className="py-8 text-center text-sm text-slate-400">Awaiting feed data...</div>}
                            </div>
                        </div>
                        <div className="col-span-2 space-y-3">
                            <h2 className="text-sm font-bold mb-1">Pipeline Status</h2>
                            <div className="rounded-xl border border-slate-200/80 bg-white p-4 space-y-4">
                                {[{label:"Classifier",model:"XLM-Roberta",ok:true},{label:"Vector Search",model:"FAISS L2-Flat",ok:!!stats?.faiss_vectors},{label:"Reranker",model:"Cross-Encoder MiniLM",ok:true},{label:"Reasoner",model:"Llama 3.3 (Groq)",ok:online},{label:"XAI Engine",model:"Occlusion Attribution",ok:true}].map((p,i)=>(
                                    <div key={i} className="flex items-center gap-3">
                                        <span className={`w-2 h-2 rounded-full flex-shrink-0 ${p.ok?'bg-emerald-500':'bg-slate-300'}`}/>
                                        <div className="flex-1 min-w-0"><div className="text-xs font-semibold text-slate-700">{p.label}</div><div className="text-[10px] text-slate-400 font-mono">{p.model}</div></div>
                                        <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded-full ${p.ok?'bg-emerald-50 text-emerald-600':'bg-slate-100 text-slate-400'}`}>{p.ok?'ACTIVE':'IDLE'}</span>
                                    </div>
                                ))}
                            </div>
                            {trending.length>0&&<div className="rounded-xl border border-slate-200/80 bg-white p-4">
                                <div className="text-xs font-bold text-slate-700 mb-3">Trending Threats</div>
                                {trending.slice(0,2).map(t=>(<div key={t.id} className="mb-2.5 last:mb-0"><div className="flex items-center gap-2 mb-0.5"><span className={`text-[9px] font-bold px-1.5 py-0.5 rounded-full ring-1 ${t.tag==='FAKE'?'bg-red-50 text-red-600 ring-red-200':'bg-amber-50 text-amber-600 ring-amber-200'}`}>{t.tag}</span><span className="text-[10px] text-slate-400 font-mono">{t.impact}</span></div><div className="text-xs font-medium text-slate-700 leading-snug">{t.title}</div></div>))}
                                <button onClick={()=>setView('trending')} className="w-full mt-2 text-[11px] text-accent font-semibold hover:underline text-center">View all trends</button>
                            </div>}
                        </div>
                    </div>
                </div>
            );

            /* ── Feed ── */
            const Feed=()=>(<div className="space-y-6 fade-up"><div className="flex items-center justify-between"><div><h1 className="text-2xl font-extrabold tracking-tight">Intelligence Feed</h1><p className="text-sm text-slate-500 mt-0.5">Real-time news and social signals for triage and verification.</p></div><button onClick={refreshFeed} className="px-3.5 py-2 rounded-xl border border-slate-200 text-sm font-medium hover:bg-white hover:shadow-sm transition">Refresh</button></div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">{feed.length?feed.map(item=>(<div key={item.id} className="bg-white rounded-xl border border-slate-200/80 p-5 flex flex-col group hover:border-accent/30 hover:shadow-md hover:shadow-slate-200/50 transition-all">
                    <div className="flex items-center justify-between mb-3"><div className={`w-9 h-9 rounded-lg flex items-center justify-center ${item.type==='NEWS'?'bg-blue-50 text-blue-500':'bg-violet-50 text-violet-500'}`}><Icon name={item.type==='NEWS'?'news':'hash'} sz={16}/></div><span className={`text-[9px] font-bold px-2 py-0.5 rounded-full ring-1 ${bg(item.status)}`}>{item.status}</span></div>
                    <div className="text-[10px] font-mono text-slate-400 mb-1">{item.source} · {item.timestamp}</div>
                    <h3 className="text-sm font-bold text-slate-800 mb-1 group-hover:text-accent transition">{item.title}</h3>
                    <p className="text-xs text-slate-500 leading-relaxed mb-4 flex-grow">{item.description}</p>
                    <div className="flex gap-2"><button onClick={()=>{setQuery(item.description);submit(item.description);}} className="flex-1 py-2 rounded-lg bg-accent/5 border border-accent/20 text-xs font-semibold text-accent hover:bg-accent hover:text-white transition">Analyze</button><button onClick={()=>{setQuery(item.description);setView('overview');}} className="py-2 px-3 rounded-lg border border-slate-200 text-xs text-slate-500 hover:bg-slate-50 transition">Edit</button></div>
                </div>)):<div className="col-span-2 py-12 text-center text-sm text-slate-400">Feed loading...</div>}</div>
            </div>);

            /* ── Trending ── */
            const Trending=()=>(<div className="space-y-6 fade-up"><div><h1 className="text-2xl font-extrabold tracking-tight">Trending Narratives</h1><p className="text-sm text-slate-500 mt-0.5">High-impact misinformation patterns currently circulating.</p></div>
                <div className="space-y-4">{trending.length?trending.map(t=>(<div key={t.id} className="bg-white rounded-xl border border-slate-200/80 p-6 group hover:shadow-md hover:shadow-slate-200/50 transition-all">
                    <div className="flex items-center gap-3 mb-3"><span className={`text-[10px] font-bold px-2.5 py-1 rounded-full ring-1 ${t.tag==='FAKE'?'bg-red-50 text-red-700 ring-red-200':'bg-amber-50 text-amber-700 ring-amber-200'}`}>{t.tag}</span><span className="text-xs text-slate-400 font-mono">Impact: <span className="text-slate-600 font-semibold">{t.impact}</span></span></div>
                    <h3 className="text-lg font-bold mb-2 group-hover:text-accent transition">{t.title}</h3>
                    <p className="text-sm text-slate-600 leading-relaxed mb-4">{t.description}</p>
                    <button onClick={()=>{setQuery(t.description);submit(t.description);}} className="px-4 py-2 rounded-xl bg-gradient-to-r from-accent to-violet-600 text-white text-sm font-semibold shadow-md shadow-accent/20 hover:shadow-lg transition">Analyze Pattern</button>
                </div>)):<div className="py-12 text-center text-sm text-slate-400">No trending data available.</div>}</div>
            </div>);

            /* ── Archive ── */
            const Archive=()=>(<div className="space-y-6 fade-up"><div className="flex items-center justify-between"><div><h1 className="text-2xl font-extrabold tracking-tight">Evidence Archive</h1><p className="text-sm text-slate-500 mt-0.5">Indexed evidence fragments from the knowledge base.</p></div><button onClick={refreshArchive} className="px-3.5 py-2 rounded-xl border border-slate-200 text-sm font-medium hover:bg-white hover:shadow-sm transition">Reload</button></div>
                <div className="bg-white rounded-xl border border-slate-200/80 overflow-hidden shadow-sm"><table className="w-full text-left"><thead><tr className="border-b border-slate-100 bg-slate-50/80"><th className="px-5 py-3 text-[11px] font-semibold text-slate-500 uppercase tracking-wider">Source</th><th className="px-5 py-3 text-[11px] font-semibold text-slate-500 uppercase tracking-wider">Content</th><th className="px-5 py-3 text-[11px] font-semibold text-slate-500 uppercase tracking-wider w-20">Action</th></tr></thead>
                    <tbody className="divide-y divide-slate-100">{archive.length?archive.map((item,i)=>{const src=typeof item==='string'?'Memory':(item.source||'General');const txt=typeof item==='string'?item:(item.text||'');return(<tr key={i} className="hover:bg-accent/[.02] transition"><td className="px-5 py-3 text-sm font-medium text-slate-700">{src}</td><td className="px-5 py-3 text-sm text-slate-500 line-clamp-2 max-w-xl">{txt}</td><td className="px-5 py-3"><button onClick={()=>{setQuery(txt);submit(txt);}} className="text-xs font-semibold text-accent hover:underline">Verify</button></td></tr>);}):<tr><td colSpan="3" className="px-5 py-12 text-center text-sm text-slate-400">No evidence in archive.</td></tr>}</tbody></table></div>
            </div>);

            /* ── Architecture ── */
            const Arch=()=>(<div className="space-y-6 fade-up"><div><h1 className="text-2xl font-extrabold tracking-tight">System Architecture</h1><p className="text-sm text-slate-500 mt-0.5">SAMI verification pipeline layers and active components.</p></div>
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-5"><div className="space-y-3">{[
                    {step:"01",name:"Multimodal Intake",model:neural?.local_classifier||"XLM-Roberta",desc:"OCR (Tesseract), speech-to-text (Whisper), and video frame extraction.",color:"from-blue-500 to-indigo-500"},
                    {step:"02",name:"Neural Classification",model:"Multi-Label XLM-R",desc:"Local model scores veracity and toxicity using sigmoid activations.",color:"from-indigo-500 to-violet-500"},
                    {step:"03",name:"RAG Evidence Retrieval",model:neural?.vector_engine||"FAISS L2-Flat",desc:"Two-stage retrieval: broad FAISS search then cross-encoder reranking.",color:"from-violet-500 to-purple-500"},
                    {step:"04",name:"LLM Multi-Agent Debate",model:neural?.reasoner||"Llama 3.3 (Groq)",desc:"Prosecutor, Defense, and Judge agents reason over evidence sequentially.",color:"from-purple-500 to-fuchsia-500"},
                    {step:"05",name:"Explainable AI (XAI)",model:"Occlusion Attribution",desc:"Token-level influence scores reveal exactly why the model decided.",color:"from-fuchsia-500 to-pink-500"}
                ].map((l,i)=>(<div key={i} className="bg-white rounded-xl border border-slate-200/80 p-5 relative overflow-hidden group hover:shadow-md transition-all">
                    <div className={`absolute -top-3 -right-3 w-20 h-20 rounded-full bg-gradient-to-br ${l.color} opacity-[0.06] group-hover:opacity-[0.12] transition`}/>
                    <div className="relative"><div className="flex items-center gap-2 mb-2"><span className={`text-[10px] font-bold text-white bg-gradient-to-r ${l.color} px-2 py-0.5 rounded-full`}>STEP {l.step}</span><span className="text-[10px] font-mono text-slate-400">{l.model}</span></div>
                    <h3 className="text-sm font-bold mb-1">{l.name}</h3><p className="text-xs text-slate-500 leading-relaxed">{l.desc}</p></div>
                </div>))}</div>
                    <div className="bg-white rounded-xl border border-slate-200/80 p-6 flex flex-col">
                        <h3 className="text-sm font-bold mb-5">Runtime Metrics</h3>
                        <div className="space-y-5 flex-grow">{[
                            {label:"Engine Load",val:"Optimal",pct:87,color:"bg-gradient-to-r from-emerald-400 to-emerald-500"},
                            {label:"RAG Latency",val:"~140ms",pct:72,color:"bg-gradient-to-r from-emerald-400 to-teal-500"},
                            {label:"LLM Stream",val:"Active",pct:91,color:"bg-gradient-to-r from-accent to-violet-500"},
                            {label:"XAI Module",val:"Ready",pct:68,color:"bg-gradient-to-r from-violet-400 to-purple-500"}
                        ].map((m,i)=>(<div key={i}><div className="flex justify-between text-xs mb-1.5"><span className="text-slate-500 font-medium">{m.label}</span><span className="text-slate-800 font-semibold">{m.val}</span></div>
                            <div className="h-2 bg-slate-100 rounded-full overflow-hidden"><div className={`h-full ${m.color} rounded-full`} style={{width:`${m.pct}%`}}/></div></div>))}</div>
                        <div className="mt-6 p-4 rounded-xl bg-gradient-to-br from-slate-900 to-slate-800 text-white"><div className="text-[10px] text-slate-400 font-mono uppercase mb-1">Deployment</div><div className="text-sm font-bold">All layers active — Local Node</div></div>
                    </div>
                </div>
            </div>);

            /* ── Result Modal ── */
            const Modal=()=>{if(!result)return null;return(
                <div className="fixed inset-0 z-50 flex items-start justify-center pt-6 pb-6 px-4 overflow-y-auto">
                    <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={()=>setResult(null)}/>
                    <div className="relative bg-white w-full max-w-5xl rounded-2xl shadow-2xl border border-slate-200">
                        <div className="sticky top-0 z-10 bg-white/95 backdrop-blur border-b border-slate-100 rounded-t-2xl px-8 py-5 flex items-start justify-between gap-4">
                            <div>
                                <div className="flex flex-wrap gap-2 mb-2">
                                    <span className={`text-xs font-bold px-2.5 py-1 rounded-full ring-1 ${bg(result.veracity?.prediction)}`}>{(result.veracity?.prediction||"unknown").toUpperCase()}</span>
                                    <span className={`text-xs font-bold px-2.5 py-1 rounded-full ring-1 ${bg(result.toxicity?.prediction)}`}>Toxicity: {result.toxicity?.prediction||"safe"}</span>
                                    {result.veracity?.confidence!=null&&<span className="text-xs text-slate-400 font-mono py-1">Conf: {(result.veracity.confidence*100).toFixed(1)}%</span>}
                                </div>
                                <h2 className="text-lg font-extrabold leading-snug">{result.claim}</h2>
                            </div>
                            <button onClick={()=>setResult(null)} className="p-2 rounded-lg hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition flex-shrink-0"><Icon name="x"/></button>
                        </div>
                        <div className="p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <div className="lg:col-span-7 space-y-6">
                                <section><div className="flex items-center gap-2 mb-3"><Icon name="brain" className="text-accent"/><h3 className="text-sm font-bold">Neural Reasoning</h3></div>
                                    <div className="p-4 rounded-xl bg-gradient-to-br from-slate-50 to-white border border-slate-100 text-sm text-slate-700 leading-relaxed">{result.generated_reason||"No reasoning generated."}</div></section>
                                <section><h3 className="text-sm font-bold mb-3">Manipulation Anatomy</h3>
                                    <div className="p-4 rounded-xl bg-gradient-to-br from-slate-50 to-white border-l-4 border-l-accent border border-slate-100 text-sm text-slate-600 leading-relaxed italic">{Array.isArray(result.propaganda_anatomy)?result.propaganda_anatomy.join(" "):result.propaganda_anatomy}</div></section>
                                {result.historical_context&&<section><h3 className="text-sm font-bold mb-3">Historical Context</h3><div className="p-4 rounded-xl bg-gradient-to-br from-slate-50 to-white border border-slate-100 text-sm text-slate-600 leading-relaxed">{result.historical_context}</div></section>}
                                <section><div className="flex items-center gap-2 mb-3"><Icon name="eye" className="text-accent"/><h3 className="text-sm font-bold">Interpretability Heatmap</h3><span className="text-[10px] font-mono text-slate-400 ml-auto">Target: {result.xai_target_label||"veracity"}</span></div><XAIHeatmap attributions={result.xai_attributions}/></section>
                            </div>
                            <div className="lg:col-span-5 space-y-6">
                                <section><div className="flex items-center gap-2 mb-3"><Icon name="net" className="text-accent"/><h3 className="text-sm font-bold">Evidence Graph</h3></div><EvidenceGraph claim={result.claim} evidence={result.evidence||[]}/></section>
                                <section><div className="flex items-center justify-between mb-3"><h3 className="text-sm font-bold">Retrieved Evidence</h3><span className="text-[10px] font-mono text-slate-400">{(result.evidence||[]).length} sources</span></div>
                                    <div className="space-y-2">{(result.evidence||[]).length?result.evidence.map((ev,i)=>(<div key={i} className="p-3 rounded-lg bg-slate-50 border border-slate-100 text-xs text-slate-600 leading-relaxed">{ev}</div>)):<div className="p-6 text-center border border-dashed border-slate-200 rounded-xl text-xs text-slate-400">No external evidence retrieved.</div>}</div></section>
                            </div>
                        </div>
                    </div>
                </div>
            );};

            return(<div className="flex min-h-screen"><Sidebar/><main className="flex-1 px-8 py-7 max-w-[1100px]">
                {view==="overview"&&<Overview/>}{view==="feed"&&<Feed/>}{view==="trending"&&<Trending/>}{view==="archive"&&<Archive/>}{view==="architecture"&&<Arch/>}
            </main><Modal/>
                {loading&&<div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-40 bg-white px-5 py-3.5 rounded-2xl border border-slate-200 shadow-xl shadow-slate-200/50 flex items-center gap-3">
                    <div className="w-8 h-8 rounded-lg bg-accent/10 flex items-center justify-center"><Icon name="spin" sz={18} className="text-accent"/></div>
                    <div><div className="text-sm font-semibold text-slate-700">Pipeline Active</div><div className="text-[11px] text-slate-400">Analyzing through classification, RAG & reasoning</div></div>
                </div>}
            </div>);
        }
        ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    </script>
</body>
</html>
