<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAMI | Verification Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
            serif: ['Instrument Serif', 'serif'],
            mono: ['IBM Plex Mono', 'monospace']
          },
          colors: {
            sand: '#f5efe6',
            ink: '#172127',
            mint: '#117766',
            rust: '#b86433',
            moss: '#2f7b5d',
            rose: '#b5484d'
          },
          boxShadow: {
            soft: '0 24px 80px rgba(20, 33, 39, 0.12)'
          }
        }
      }
    };
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    body {
      background:
        radial-gradient(circle at top left, rgba(17,119,102,.12), transparent 28%),
        radial-gradient(circle at top right, rgba(184,100,51,.14), transparent 24%),
        linear-gradient(180deg, #faf6ef 0%, #f3ecdf 100%);
    }
    .glass { backdrop-filter: blur(16px); }
  </style>
</head>
<body class="min-h-screen text-ink font-sans">
  <div id="root"></div>
  <script type="text/babel">
    const { useEffect, useRef, useState } = React;
    const API_BASE = window.location.protocol.startsWith("http") ? window.location.origin : "http://127.0.0.1:8000";

    const compact = (n) => new Intl.NumberFormat("en", { notation: "compact" }).format(n || 0);
    const badgeTone = (value) => {
      const key = String(value || "unknown").toLowerCase();
      if (["real", "safe", "verified"].includes(key)) return "bg-emerald-100 text-emerald-700";
      if (["fake", "misleading", "hate", "suspicious"].includes(key)) return "bg-rose-100 text-rose-700";
      return "bg-slate-200 text-slate-600";
    };

    function EvidenceGraph({ claim, evidence }) {
      const ref = useRef(null);
      useEffect(() => {
        if (!ref.current || !Array.isArray(evidence)) return;
        const nodes = new vis.DataSet([
          { id: 0, label: claim.length > 44 ? `${claim.slice(0, 41)}...` : claim, color: { background: "#117766", border: "#0a5e50" }, font: { color: "#fff", face: "Manrope", size: 14 }, shape: "dot", size: 26 },
          ...evidence.map((item, idx) => ({ id: idx + 1, label: String(item).slice(0, 36), color: { background: "#fff9f2", border: "#d6c4b4" }, font: { color: "#172127", face: "Manrope", size: 11 }, shape: "box", margin: 10 }))
        ]);
        const edges = new vis.DataSet(evidence.map((_, idx) => ({ from: 0, to: idx + 1, color: { color: "rgba(17,119,102,.25)" } })));
        const network = new vis.Network(ref.current, { nodes, edges }, {
          physics: { stabilization: true, barnesHut: { gravitationalConstant: -2400, springLength: 160 } },
          interaction: { hover: true, dragNodes: true }
        });
        return () => network.destroy();
      }, [claim, evidence]);
      return <div ref={ref} className="h-80 rounded-3xl border border-slate-200 bg-white/70"></div>;
    }

    function XAIHeatmap({ attributions }) {
      if (!Array.isArray(attributions) || !attributions.length) {
        return <div className="rounded-3xl border border-dashed border-slate-300 bg-white/50 p-6 text-sm text-slate-500">Mechanistic interpretability is unavailable for this report.</div>;
      }
      return (
        <div className="flex flex-wrap gap-2">
          {attributions.map((item, idx) => {
            const score = item.attribution_score || item.score || 0;
            const alpha = Math.min(Math.abs(score) * 0.35, 0.9);
            const bg = score > 0 ? `rgba(181,72,77,${alpha})` : score < 0 ? `rgba(17,119,102,${alpha})` : "rgba(23,33,39,.06)";
            return (
              <span key={`${item.word}-${idx}`} title={`Attribution: ${score.toFixed(4)}`} className="rounded-xl px-2 py-1 text-sm" style={{ background: bg, color: Math.abs(score) > 0.7 ? "#fff" : "#172127" }}>
                {item.word}
              </span>
            );
          })}
        </div>
      );
    }

    function App() {
      const [view, setView] = useState("overview");
      const [feed, setFeed] = useState([]);
      const [archive, setArchive] = useState([]);
      const [stats, setStats] = useState(null);
      const [neural, setNeural] = useState(null);
      const [query, setQuery] = useState("");
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const [points, setPoints] = useState(Number(localStorage.getItem("truth_points_v6") || 0));
      const imageRef = useRef(null);
      const videoRef = useRef(null);

      useEffect(() => { refreshFeed(); refreshStats(); refreshNeural(); }, []);
      useEffect(() => { if (view === "archive") refreshArchive(); if (view === "architecture") refreshNeural(); }, [view]);

      const bump = (delta) => {
        const next = points + delta;
        setPoints(next);
        localStorage.setItem("truth_points_v6", String(next));
      };

      const refreshFeed = async () => { try { const r = await fetch(`${API_BASE}/feed`); if (r.ok) setFeed(await r.json()); } catch {} };
      const refreshArchive = async () => { try { const r = await fetch(`${API_BASE}/archive`); if (r.ok) setArchive(await r.json()); } catch {} };
      const refreshStats = async () => { try { const r = await fetch(`${API_BASE}/system-status`); if (r.ok) setStats(await r.json()); } catch {} };
      const refreshNeural = async () => { try { const r = await fetch(`${API_BASE}/neural-stats`); if (r.ok) setNeural(await r.json()); } catch {} };

      const poll = (taskId) => {
        const interval = setInterval(async () => {
          try {
            const r = await fetch(`${API_BASE}/task-status/${taskId}`);
            const data = await r.json();
            if (data.status === "completed") {
              clearInterval(interval);
              setResult(data.result);
              setLoading(false);
            }
            if (data.status === "failed") {
              clearInterval(interval);
              setLoading(false);
              alert(data.error || "Analysis failed");
            }
          } catch {
            clearInterval(interval);
            setLoading(false);
            alert("Connection lost while waiting for analysis.");
          }
        }, 2000);
      };

      const submitClaim = async (text = query) => {
        const claim = String(text || "").trim();
        if (!claim) return;
        setLoading(true);
        try {
          const r = await fetch(`${API_BASE}/verify`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: claim })
          });
          const data = await r.json();
          if (!r.ok) throw new Error(data.detail || data.error || "Request failed");
          bump(20);
          if (data.task_id) poll(data.task_id); else { setResult(data); setLoading(false); }
        } catch (e) {
          setLoading(false);
          alert(e.message || "Backend unreachable");
        }
      };

      const submitUpload = async (file, endpoint) => {
        if (!file) return;
        setLoading(true);
        const form = new FormData();
        form.append("file", file);
        try {
          const r = await fetch(`${API_BASE}${endpoint}`, { method: "POST", body: form });
          const data = await r.json();
          if (!r.ok) throw new Error(data.detail || data.error || "Upload failed");
          bump(40);
          if (data.task_id) poll(data.task_id); else { setResult(data); setLoading(false); }
        } catch (e) {
          setLoading(false);
          alert(e.message || "Upload failed");
        }
      };

      const metrics = [
        ["Knowledge base", compact(stats?.dataset_entries), "indexed evidence records"],
        ["Vectors ready", compact(stats?.faiss_vectors), "searchable memory entries"],
        ["Trust points", compact(points), "operator activity"],
        ["System state", stats?.api_status === "running" ? "Live" : "Offline", "runtime health"]
      ];

      const quickPrompts = [
        "Verify whether this viral post is fabricated or misleading.",
        "Check if this caption incites hate or harmful targeting.",
        "Analyze this breaking claim and explain the evidence trail.",
        "Review this narrative thread for propaganda patterns."
      ];

      const featuredFeed = feed.slice(0, 4);
      const pipeline = [
        ["Intake", loading ? "Running" : "Ready", loading ? "Claim or media is moving through the verification pipeline." : "Text, image, and video input are available right now."],
        ["Retrieval", stats?.faiss_vectors ? "Online" : "Cold", stats?.faiss_vectors ? "Vector memory is available for evidence grounding." : "Evidence memory is not yet reporting active vectors."],
        ["Reasoning", stats?.api_status === "running" ? "Connected" : "Waiting", stats?.api_status === "running" ? "Backend reasoning is reachable from this workspace." : "The reasoning layer is currently reconnecting."],
        ["Interpretability", result?.xai_attributions?.length ? "Ready" : "Standby", result?.xai_attributions?.length ? "The latest report includes token-level attributions." : "Heatmap data will appear after the next completed run."]
      ];

      const renderCommandCenter = () => (
        <div className="glass rounded-[2rem] border border-white/60 bg-white/78 p-6 shadow-soft">
          <div className="mb-5 flex flex-col gap-4">
            <div className="flex items-start justify-between gap-4">
              <div>
                <div className="mb-2 font-mono text-xs uppercase tracking-[0.22em] text-mint">Command center</div>
                <h3 className="text-xl font-semibold">Run a full verification sequence</h3>
                <p className="mt-2 text-sm leading-7 text-slate-500">Paste a claim, upload media, and launch a report from anywhere in the app.</p>
              </div>
              <div className="rounded-full bg-mint/10 px-4 py-2 text-sm font-semibold text-mint">{compact(points)} trust points</div>
            </div>

            <div className="rounded-[1.5rem] border border-slate-200 bg-white/90 p-4 shadow-sm">
              <textarea value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Paste a post, claim, caption, headline, or narrative thread you want to validate." className="min-h-[180px] w-full resize-y border-0 bg-transparent text-base leading-7 outline-none placeholder:text-slate-400"></textarea>
            </div>

            <div className="grid gap-3">
              <input type="file" hidden ref={imageRef} accept="image/*" onChange={(e) => submitUpload(e.target.files[0], "/verify-image")} />
              <input type="file" hidden ref={videoRef} accept="video/*" onChange={(e) => submitUpload(e.target.files[0], "/verify-video")} />
              <button onClick={() => submitClaim()} disabled={loading} className="rounded-2xl bg-gradient-to-r from-ink to-mint px-6 py-4 font-semibold text-white shadow-lg transition hover:-translate-y-0.5 disabled:opacity-60">
                {loading ? "Running verification..." : "Generate verification report"}
              </button>
              <div className="grid gap-3 sm:grid-cols-2">
                <button onClick={() => imageRef.current?.click()} disabled={loading} className="rounded-2xl border border-slate-200 bg-white px-5 py-4 text-left text-sm font-medium transition hover:-translate-y-0.5 hover:border-slate-300 disabled:opacity-60">Upload image evidence</button>
                <button onClick={() => videoRef.current?.click()} disabled={loading} className="rounded-2xl border border-slate-200 bg-white px-5 py-4 text-left text-sm font-medium transition hover:-translate-y-0.5 hover:border-slate-300 disabled:opacity-60">Upload video evidence</button>
              </div>
            </div>
          </div>
        </div>
      );

      const renderQuickStarts = () => (
        <div className="glass rounded-[2rem] border border-white/60 bg-white/72 p-6 shadow-soft">
          <div className="mb-4">
            <h3 className="text-xl font-semibold">Quick starts</h3>
            <p className="mt-2 text-sm leading-7 text-slate-500">Use one of these as a starting draft, then refine it in the command center.</p>
          </div>
          <div className="grid gap-3">
            {quickPrompts.map((prompt) => (
              <button key={prompt} onClick={() => setQuery(prompt)} className="rounded-2xl border border-slate-200 bg-white/90 px-4 py-4 text-left text-sm leading-6 text-slate-600 transition hover:-translate-y-0.5 hover:border-mint hover:text-ink">
                {prompt}
              </button>
            ))}
          </div>
        </div>
      );

      const renderLatestReport = () => (
        <div className="glass rounded-[2rem] border border-white/60 bg-white/72 p-6 shadow-soft">
          <div className="mb-4">
            <h3 className="text-xl font-semibold">Latest report</h3>
            <p className="mt-2 text-sm leading-7 text-slate-500">The most recent verification stays pinned while you move around the workspace.</p>
          </div>
          {result ? (
            <div className="rounded-[1.5rem] border border-slate-200 bg-white/90 p-5">
              <div className="mb-3 flex flex-wrap gap-2">
                <span className={`rounded-full px-3 py-1 text-xs font-bold uppercase tracking-[0.12em] ${badgeTone(result.veracity?.prediction)}`}>{result.veracity?.prediction || "unknown"}</span>
                <span className={`rounded-full px-3 py-1 text-xs font-bold uppercase tracking-[0.12em] ${badgeTone(result.toxicity?.prediction)}`}>toxicity: {result.toxicity?.prediction || "unknown"}</span>
              </div>
              <div className="text-base font-semibold leading-7 text-ink">{result.claim}</div>
              <div className="mt-3 text-sm leading-7 text-slate-500">{result.generated_reason || "No generated reason available."}</div>
              <button onClick={() => setResult(result)} className="mt-4 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-medium">Open full report</button>
            </div>
          ) : (
            <div className="rounded-[1.5rem] border border-dashed border-slate-300 bg-white/55 p-6 text-sm leading-7 text-slate-500">
              Run a claim or upload evidence and the newest report will stay here for quick reference.
            </div>
          )}
        </div>
      );

      const renderOverview = () => (
        <>
          <div className="grid gap-5 xl:grid-cols-[1.15fr_.85fr]">
            <div className="glass rounded-[2rem] border border-white/60 bg-white/72 p-6 shadow-soft">
              <div className="mb-5 flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
                <div>
                  <div className="mb-2 font-mono text-xs uppercase tracking-[0.22em] text-mint">Operations board</div>
                  <h2 className="text-3xl font-bold tracking-[-0.06em] md:text-4xl">This is the verification workspace first, and the product story second.</h2>
                  <p className="mt-3 max-w-3xl text-sm leading-7 text-slate-500">The app now centers around live intake, active system state, and report continuity instead of static hero sections.</p>
                </div>
                <div className="rounded-[1.5rem] border border-slate-200 bg-white/90 px-4 py-3 text-sm text-slate-500">
                  <div className="font-semibold text-ink">{loading ? "Verification running" : "Console ready"}</div>
                  <div className="mt-1">Current workspace: {view}</div>
                </div>
              </div>
              <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
                {metrics.map(([label, value, note]) => (
                  <div key={label} className="rounded-[1.5rem] border border-slate-200 bg-white/90 p-4">
                    <div className="text-sm text-slate-500">{label}</div>
                    <div className="mt-2 text-3xl font-bold tracking-[-0.08em]">{value}</div>
                    <div className="mt-2 text-sm leading-6 text-slate-500">{note}</div>
                  </div>
                ))}
              </div>
            </div>

            <div className="rounded-[2rem] border border-slate-900/5 bg-gradient-to-b from-slate-900 to-slate-800 p-6 text-sand shadow-soft">
              <div className="mb-4 font-mono text-xs uppercase tracking-[0.22em] text-slate-300">Pipeline pulse</div>
              <div className="space-y-4">
                {pipeline.map(([title, state, copy]) => (
                  <div key={title} className="rounded-[1.5rem] border border-white/10 bg-white/5 p-4">
                    <div className="mb-2 flex items-center justify-between gap-3">
                      <div className="font-semibold">{title}</div>
                      <span className={`rounded-full px-3 py-1 text-xs font-bold uppercase tracking-[0.12em] ${state === "Ready" || state === "Online" || state === "Connected" ? "bg-emerald-400/15 text-emerald-100" : state === "Running" ? "bg-amber-300/15 text-amber-100" : "bg-white/10 text-slate-200"}`}>{state}</span>
                    </div>
                    <div className="text-sm leading-6 text-slate-300">{copy}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div className="grid gap-5 xl:grid-cols-[1.15fr_.85fr]">
            <div className="glass rounded-[2rem] border border-white/60 bg-white/72 p-6 shadow-soft">
              <div className="mb-5 flex items-center justify-between gap-4">
                <div>
                  <h3 className="text-xl font-semibold">Signals needing review</h3>
                  <p className="mt-2 text-sm leading-7 text-slate-500">Current feed entries that can be loaded or analyzed immediately.</p>
                </div>
                <button onClick={refreshFeed} className="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-medium">Refresh feed</button>
              </div>
              <div className="grid gap-4">
                {featuredFeed.length ? featuredFeed.map((item) => (
                  <div key={item.id} className="rounded-[1.5rem] border border-slate-200 bg-white/90 p-5 transition hover:-translate-y-0.5 hover:shadow-md">
                    <div className="mb-3 flex flex-wrap items-center justify-between gap-3">
                      <div className="font-mono text-xs uppercase tracking-[0.12em] text-slate-500">{item.source} · {item.timestamp}</div>
                      <span className={`rounded-full px-3 py-1 text-xs font-bold uppercase tracking-[0.12em] ${badgeTone(item.status)}`}>{item.status}</span>
                    </div>
                    <div className="mb-2 text-lg font-semibold">{item.title}</div>
                    <div className="text-sm leading-7 text-slate-500">{item.description}</div>
                    <div className="mt-4 flex flex-wrap gap-3">
                      <button onClick={() => { setQuery(item.description); submitClaim(item.description); }} className="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-medium transition hover:border-mint hover:text-mint">Analyze signal</button>
                      <button onClick={() => setQuery(item.description)} className="rounded-2xl border border-transparent bg-sand px-4 py-3 text-sm font-medium text-slate-600">Load into editor</button>
                    </div>
                  </div>
                )) : <div className="rounded-[1.5rem] border border-dashed border-slate-300 bg-white/55 p-6 text-sm text-slate-500">The live feed is temporarily unavailable.</div>}
              </div>
            </div>

            <div className="glass rounded-[2rem] border border-white/60 bg-white/72 p-6 shadow-soft">
              <div className="mb-4">
                <h3 className="text-xl font-semibold">Workspace behavior</h3>
                <p className="mt-2 text-sm leading-7 text-slate-500">These are the things that make it feel like a product console now.</p>
              </div>
              <div className="space-y-4">
                {[
                  ["Persistent action rail", "The command center stays visible while you inspect feed items, architecture, or archived evidence."],
                  ["Operational state", "The canvas reflects whether analysis is running, whether retrieval is online, and whether XAI exists."],
                  ["Fast transitions", "Feed cards can prefill the editor or launch verification immediately without changing screens."],
                  ["Report continuity", "The latest report remains available in the right rail instead of disappearing after navigation."]
                ].map(([title, copy]) => (
                  <div key={title} className="rounded-[1.5rem] border border-slate-200 bg-white/90 p-4">
                    <div className="mb-1 font-semibold">{title}</div>
                    <div className="text-sm leading-7 text-slate-500">{copy}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </>
      );

      const renderFeed = () => (
        <div className="grid gap-5 xl:grid-cols-[1.1fr_.9fr]">
          <div className="glass rounded-[2rem] border border-white/60 bg-white/72 p-6 shadow-soft">
            <div className="mb-5 flex items-center justify-between gap-4">
              <div>
                <h3 className="text-xl font-semibold">Monitoring feed</h3>
                <p className="mt-2 text-sm leading-7 text-slate-500">Triage incoming claims and send the strongest candidates into verification.</p>
              </div>
              <button onClick={refreshFeed} className="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-medium">Refresh feed</button>
            </div>
            <div className="space-y-4">
              {feed.length ? feed.map((item) => (
                <div key={item.id} className="rounded-[1.5rem] border border-slate-200 bg-white/90 p-5">
                  <div className="mb-3 flex flex-wrap items-center justify-between gap-3">
                    <div className="font-mono text-xs uppercase tracking-[0.12em] text-slate-500">{item.source} · {item.timestamp}</div>
                    <span className={`rounded-full px-3 py-1 text-xs font-bold uppercase tracking-[0.12em] ${badgeTone(item.status)}`}>{item.status}</span>
                  </div>
                  <div className="mb-2 text-lg font-semibold">{item.title}</div>
                  <div className="text-sm leading-7 text-slate-500">{item.description}</div>
                  <div className="mt-4 flex flex-wrap gap-3">
                    <button onClick={() => { setQuery(item.description); submitClaim(item.description); }} className="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-medium">Analyze now</button>
                    <button onClick={() => setQuery(item.description)} className="rounded-2xl border border-transparent bg-sand px-4 py-3 text-sm font-medium text-slate-600">Load into editor</button>
                  </div>
                </div>
              )) : <div className="rounded-[1.5rem] border border-dashed border-slate-300 bg-white/55 p-6 text-sm text-slate-500">The feed is currently unavailable.</div>}
            </div>
          </div>

          <div className="space-y-5">
            <div className="glass rounded-[2rem] border border-white/60 bg-white/72 p-6 shadow-soft">
              <div className="mb-4">
                <h3 className="text-xl font-semibold">Triage guide</h3>
                <p className="mt-2 text-sm leading-7 text-slate-500">Use the feed like an analyst queue rather than a content wall.</p>
              </div>
              <div className="space-y-4">
                {[
                  ["Load first", "Use prefill when you want to add context, remove noise, or rewrite the claim before analysis."],
                  ["Run directly", "Use immediate analysis when the feed item already reads like a standalone claim or caption."],
                  ["Cross-check memory", "Move to the archive when you want to compare current signals against previously ingested material."]
                ].map(([title, copy]) => (
                  <div key={title} className="rounded-[1.5rem] border border-slate-200 bg-white/90 p-4">
                    <div className="mb-1 font-semibold">{title}</div>
                    <div className="text-sm leading-7 text-slate-500">{copy}</div>
                  </div>
                ))}
              </div>
            </div>
            {renderLatestReport()}
          </div>
        </div>
      );

      const renderArchive = () => (
        <div className="grid gap-5 xl:grid-cols-[1.1fr_.9fr]">
          <div className="glass rounded-[2rem] border border-white/60 bg-white/72 p-6 shadow-soft">
            <div className="mb-5 flex items-center justify-between gap-4">
              <div>
                <h3 className="text-xl font-semibold">Evidence archive</h3>
                <p className="mt-2 text-sm leading-7 text-slate-500">Review material already captured in local evidence memory.</p>
              </div>
              <button onClick={refreshArchive} className="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-medium">Reload archive</button>
            </div>
            <div className="space-y-4">
              {archive.length ? archive.map((item, idx) => (
                <div key={`${idx}-${typeof item === "string" ? item : item.text}`} className="rounded-[1.5rem] border border-slate-200 bg-white/90 p-5 text-sm leading-7 text-slate-500">
                  {typeof item === "string" ? item : `[${item.source || "source"}] ${item.text || ""}`}
                </div>
              )) : <div className="rounded-[1.5rem] border border-dashed border-slate-300 bg-white/55 p-6 text-sm text-slate-500">No archived evidence is available yet.</div>}
            </div>
          </div>

          <div className="space-y-5">
            <div className="glass rounded-[2rem] border border-white/60 bg-white/72 p-6 shadow-soft">
              <div className="mb-4">
                <h3 className="text-xl font-semibold">Archive posture</h3>
                <p className="mt-2 text-sm leading-7 text-slate-500">Treat memory as reusable evidence, not passive storage.</p>
              </div>
              <div className="grid gap-4">
                {[
                  ["Archive size", compact(archive.length || stats?.dataset_entries), "items visible or indexed in memory"],
                  ["Vector state", stats?.faiss_vectors ? "Searchable" : "Unavailable", "retrieval quality depends on vector availability"],
                  ["Best use", "Counter-check recurring narratives", "bring older evidence back into new reports"]
                ].map(([title, value, note]) => (
                  <div key={title} className="rounded-[1.5rem] border border-slate-200 bg-white/90 p-4">
                    <div className="text-sm text-slate-500">{title}</div>
                    <div className="mt-2 text-2xl font-bold tracking-[-0.06em]">{value}</div>
                    <div className="mt-2 text-sm leading-6 text-slate-500">{note}</div>
                  </div>
                ))}
              </div>
            </div>
            {renderLatestReport()}
          </div>
        </div>
      );

      const renderArchitecture = () => (
        <div className="grid gap-5 xl:grid-cols-[1.1fr_.9fr]">
          <div className="glass rounded-[2rem] border border-white/60 bg-white/72 p-6 shadow-soft">
            <div className="mb-5">
              <h3 className="text-xl font-semibold">System architecture</h3>
              <p className="mt-2 text-sm leading-7 text-slate-500">Frame the app like a modern verification stack with visible stages and outputs.</p>
            </div>
            <div className="grid gap-4">
              {[
                ["1. Screening model", neural?.local_classifier || "Classifier unavailable", "Initial veracity and toxicity screening."],
                ["2. Memory and retrieval", neural?.vector_engine || "Vector store unavailable", "Grounding through indexed evidence memory."],
                ["3. Ranking stage", neural?.reranker || "Reranker unavailable", "Selection of the most useful support passages."],
                ["4. Expert reasoning", neural?.reasoner || "Reasoner unavailable", "Narrative explanation, historical framing, and synthesis."]
              ].map(([title, value, copy]) => (
                <div key={title} className="rounded-[1.5rem] border border-slate-200 bg-white/90 p-5">
                  <div className="mb-2 flex items-center justify-between gap-4">
                    <div className="font-semibold">{title}</div>
                    <span className="rounded-full bg-sand px-3 py-1 text-xs font-bold uppercase tracking-[0.12em] text-slate-600">Active layer</span>
                  </div>
                  <div className="text-sm font-medium leading-7 text-ink">{value}</div>
                  <div className="mt-2 text-sm leading-7 text-slate-500">{copy}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="space-y-5">
            <div className="rounded-[2rem] border border-slate-900/5 bg-gradient-to-b from-slate-900 to-slate-800 p-6 text-sand shadow-soft">
              <div className="mb-4 font-mono text-xs uppercase tracking-[0.22em] text-slate-300">Deployment story</div>
              <div className="space-y-4">
                {[
                  ["Single surface", "Backend and frontend work as one deployable product instead of disconnected pieces."],
                  ["Explainable output", "Reports combine evidence, narrative reasoning, and token-level interpretability."],
                  ["Analyst loop", "Feed, archive, and command center all support the same investigation workflow."]
                ].map(([title, copy]) => (
                  <div key={title} className="rounded-[1.5rem] border border-white/10 bg-white/5 p-4">
                    <div className="mb-1 font-semibold">{title}</div>
                    <div className="text-sm leading-6 text-slate-300">{copy}</div>
                  </div>
                ))}
              </div>
            </div>
            {renderLatestReport()}
          </div>
        </div>
      );

      return (
        <div className="mx-auto max-w-7xl p-4 md:p-6">
          <header className="glass sticky top-4 z-20 mb-6 flex flex-col gap-4 rounded-[2rem] border border-white/60 bg-white/60 px-6 py-4 shadow-soft xl:flex-row xl:items-center xl:justify-between">
            <div className="flex items-center gap-4">
              <div className="grid h-12 w-12 place-items-center rounded-2xl bg-gradient-to-br from-ink to-mint font-bold tracking-[0.2em] text-sand">SA</div>
              <div>
                <div className="text-sm font-extrabold tracking-[0.18em]">SAMI</div>
                <div className="text-sm text-slate-500">Signal analysis for modern misinformation response</div>
              </div>
            </div>
            <nav className="flex flex-wrap gap-2">
              {["overview", "feed", "archive", "architecture"].map((item) => (
                <button key={item} onClick={() => setView(item)} className={`rounded-full px-4 py-2.5 text-sm transition ${view === item ? "bg-ink text-white" : "bg-transparent text-slate-500 hover:bg-white hover:text-ink"}`}>
                  {item[0].toUpperCase() + item.slice(1)}
                </button>
              ))}
            </nav>
            <div className="flex items-center gap-3 rounded-full border border-slate-200 bg-white/80 px-4 py-2 text-sm">
              <span className="h-2.5 w-2.5 rounded-full bg-moss shadow-[0_0_0_6px_rgba(47,123,93,.12)]"></span>
              <span>{stats?.api_status === "running" ? "Deployment ready" : "Service reconnecting"}</span>
            </div>
          </header>

          <section className="mb-6 grid gap-5 xl:grid-cols-[1.2fr_.8fr]">
            <div className="glass rounded-[2rem] border border-white/60 bg-white/74 p-8 shadow-soft">
              <div className="mb-4 flex flex-wrap items-center gap-3">
                <span className="rounded-full bg-mint/10 px-4 py-2 font-mono text-xs uppercase tracking-[0.22em] text-mint">Verification operations center</span>
                <span className="rounded-full border border-slate-200 bg-white/80 px-4 py-2 text-sm text-slate-500">{stats?.api_status === "running" ? "Backend connected" : "Backend reconnecting"}</span>
              </div>
              <h1 className="max-w-4xl text-4xl font-extrabold leading-tight tracking-[-0.08em] text-ink md:text-6xl">
                Serious trust-and-safety workflow, <span className="font-serif font-normal italic text-mint">not</span> a simple static page.
              </h1>
              <p className="mt-5 max-w-3xl text-base leading-8 text-slate-600">
                The theme stays warm and editorial, but the behavior is now product-like: persistent intake, live operational state, feed triage, archive access, and reports that stay close while you work.
              </p>
              <div className="mt-8 grid gap-4 md:grid-cols-3">
                {[
                  ["Persistent intake", "The command rail stays visible across the whole workspace."],
                  ["Evidence-first loop", "Feed, archive, and verification now support one continuous analyst flow."],
                  ["Report continuity", "The newest verification result remains accessible as you move between views."]
                ].map(([title, copy]) => (
                  <div key={title} className="rounded-[1.5rem] border border-slate-200 bg-white/85 p-4">
                    <div className="mb-2 font-semibold">{title}</div>
                    <div className="text-sm leading-6 text-slate-500">{copy}</div>
                  </div>
                ))}
              </div>
            </div>

            <aside className="rounded-[2rem] border border-slate-900/5 bg-gradient-to-b from-slate-900 to-slate-800 p-7 text-sand shadow-soft">
              <div className="mb-4 font-mono text-xs uppercase tracking-[0.22em] text-slate-300">Live status</div>
              <div className="space-y-4">
                {[
                  ["API state", stats?.api_status === "running" ? "Running" : "Waiting"],
                  ["Feed items", compact(feed.length)],
                  ["Archive items", compact(archive.length || stats?.dataset_entries)],
                  ["Latest XAI", result?.xai_attributions?.length ? `${result.xai_attributions.length} tokens` : "Not generated"]
                ].map(([title, value]) => (
                  <div key={title} className="rounded-[1.5rem] border border-white/10 bg-white/5 p-4">
                    <div className="text-sm text-slate-300">{title}</div>
                    <div className="mt-2 text-2xl font-semibold">{value}</div>
                  </div>
                ))}
              </div>
            </aside>
          </section>

          <section className="grid gap-5 lg:grid-cols-[1.5fr_1fr]">
            <div className="space-y-5">
              {view === "overview" && renderOverview()}
              {view === "feed" && renderFeed()}
              {view === "archive" && renderArchive()}
              {view === "architecture" && renderArchitecture()}
            </div>

            <aside className="space-y-5">
              {renderCommandCenter()}
              {renderQuickStarts()}
              {renderLatestReport()}
            </aside>
          </section>

          {result && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/45 p-4 backdrop-blur-md">
              <div className="glass w-full max-w-6xl overflow-auto rounded-[2rem] border border-white/60 bg-white/92 p-6 shadow-soft">
                <div className="mb-6 flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
                  <div>
                    <div className="mb-3 flex flex-wrap gap-2">
                      <span className={`rounded-full px-3 py-1 text-xs font-bold uppercase tracking-[0.12em] ${badgeTone(result.veracity?.prediction)}`}>{result.veracity?.prediction || "unknown"}</span>
                      <span className={`rounded-full px-3 py-1 text-xs font-bold uppercase tracking-[0.12em] ${badgeTone(result.toxicity?.prediction)}`}>toxicity: {result.toxicity?.prediction || "unknown"}</span>
                    </div>
                    <h2 className="max-w-4xl text-3xl font-bold tracking-[-0.06em] md:text-5xl">{result.claim}</h2>
                  </div>
                  <button onClick={() => setResult(null)} className="h-11 w-11 rounded-2xl border border-slate-200 bg-white text-xl">×</button>
                </div>

                <div className="grid gap-5 lg:grid-cols-[1.05fr_.95fr]">
                  <div className="space-y-5">
                    <section className="rounded-[1.5rem] border border-slate-200 bg-white/85 p-5">
                      <h4 className="mb-3 text-lg font-semibold">Decision summary</h4>
                      <p className="text-sm leading-7 text-slate-600">{result.generated_reason || "No generated reason available."}</p>
                    </section>
                    <section className="rounded-[1.5rem] border border-slate-200 bg-white/85 p-5">
                      <h4 className="mb-3 text-lg font-semibold">Manipulation anatomy</h4>
                      <p className="text-sm leading-7 text-slate-600">{Array.isArray(result.propaganda_anatomy) ? result.propaganda_anatomy.join(" ") : result.propaganda_anatomy}</p>
                    </section>
                    {result.historical_context && (
                      <section className="rounded-[1.5rem] border border-slate-200 bg-white/85 p-5">
                        <h4 className="mb-3 text-lg font-semibold">Historical context</h4>
                        <p className="text-sm leading-7 text-slate-600">{result.historical_context}</p>
                      </section>
                    )}
                    <section className="rounded-[1.5rem] border border-slate-200 bg-white/85 p-5">
                      <h4 className="mb-3 text-lg font-semibold">Mechanistic interpretability</h4>
                      <div className="mb-4 font-mono text-xs uppercase tracking-[0.14em] text-slate-500">Target label: {result.xai_target_label || result.veracity?.prediction || "unknown"}</div>
                      <XAIHeatmap attributions={result.xai_attributions} />
                    </section>
                  </div>

                  <div className="space-y-5">
                    <section className="rounded-[1.5rem] border border-slate-200 bg-white/85 p-5">
                      <h4 className="mb-3 text-lg font-semibold">Evidence graph</h4>
                      <EvidenceGraph claim={result.claim} evidence={result.evidence || []} />
                    </section>
                    <section className="rounded-[1.5rem] border border-slate-200 bg-white/85 p-5">
                      <h4 className="mb-3 text-lg font-semibold">Retrieved evidence</h4>
                      <div className="space-y-3">
                        {(result.evidence || []).length ? (result.evidence || []).map((item, idx) => (
                          <div key={`${idx}-${item}`} className="rounded-3xl border border-slate-200 bg-sand/80 p-4 text-sm leading-7 text-slate-600">{item}</div>
                        )) : <div className="rounded-3xl border border-dashed border-slate-300 bg-white/50 p-6 text-sm text-slate-500">No external evidence was returned for this claim.</div>}
                      </div>
                    </section>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
